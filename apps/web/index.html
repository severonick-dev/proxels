<!doctype html>
<html lang="ru" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0e14" />
    <meta name="description" content="Proxels — быстрый и стабильный VPN-сервис с собственной инфраструктурой Xray (VLESS Reality). Российский ИП, оплата ЮKassa." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Proxels — VPN на собственной инфраструктуре</title>
    <!--
      FOUC-blocker: ставим тему и язык на <html> ДО рендера React,
      чтобы не вспышки светлой темы на тёмном фоне.
      Дефолт темы — dark (см. CLAUDE.md §3).
    -->
    <script>
      (function () {
        try {
          var storedTheme = localStorage.getItem('proxels:theme');
          var prefersDark =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme =
            storedTheme === 'light' || storedTheme === 'dark'
              ? storedTheme
              : storedTheme === 'system'
              ? prefersDark
                ? 'dark'
                : 'light'
              : 'dark'; // дефолт
          var root = document.documentElement;
          root.classList.remove('light', 'dark');
          root.classList.add(theme);
          root.style.colorScheme = theme;

          var storedLocale = localStorage.getItem('proxels:locale');
          var locale =
            storedLocale === 'ru' || storedLocale === 'en' ? storedLocale : 'ru';
          root.setAttribute('lang', locale);
        } catch (e) {
          // localStorage может быть недоступен (приватный режим/Safari ITP) — игнорируем.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
