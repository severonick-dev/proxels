syntax = "proto3";

package xray.app.proxyman.command;
option csharp_namespace = "Xray.App.Proxyman.Command";
option go_package = "github.com/xtls/xray-core/app/proxyman/command";

import "common/protocol/user.proto";
import "common/serial/typed_message.proto";

// Подмножество HandlerService, которое нам реально нужно:
//   - AlterInbound + AddUserOperation/RemoveUserOperation
//   - (Add/RemoveInbound, Add/RemoveOutbound, AlterOutbound — не используем).
//
// ВАЖНО: типы operation сериализуются как TypedMessage с конкретным `type`-URL.
// Сам Xray ожидает что `AlterInboundRequest.operation` будет TypedMessage{
//   type='xray.app.proxyman.command.AddUserOperation' либо ...RemoveUserOperation
// }.

message AddUserOperation {
  xray.common.protocol.User user = 1;
}

message RemoveUserOperation {
  // По этому идентификатору Xray найдёт юзера в inbound и удалит.
  // У нас этот email = subscriptionId.
  string email = 1;
}

message AlterInboundRequest {
  // Какой инбаунд патчим (например, `vless-reality` — поле Node.inboundTag).
  string tag = 1;
  xray.common.serial.TypedMessage operation = 2;
}

message AlterInboundResponse {}

service HandlerService {
  rpc AlterInbound(AlterInboundRequest) returns (AlterInboundResponse) {}
}
