packages:
  - 'apps/*'
  - 'packages/*'

# pnpm 11 требует явный allowlist для install-скриптов зависимостей.
# Здесь — официальные пакеты, которым доверяем; держим список под контролем.
allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  prisma: true
  argon2: true
  '@swc/core': true
  esbuild: true
